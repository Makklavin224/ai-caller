[globals]
BOT_HOST=127.0.0.1
BOT_PORT=4444

; Outbound: scripts/originate.sh вызывает channel originate → эта ветка.
; AudioSocket в Asterisk 20 по умолчанию гонит 8 кГц slin (тип 0x10),
; ресемплинг до 16 кГц делаем в Python-боте.
[outbound-bot]
exten => s,1,NoOp(Outbound bot on ${CHANNEL(name)})
 same => n,Answer()
 same => n,Set(UUID=${SHELL(uuidgen | tr -d '\n')})
 same => n,AudioSocket(${UUID},${BOT_HOST}:${BOT_PORT})
 same => n,Hangup()

; Входящие звонки от UIS. Пока маршрут такой же — в бота.
[from-uis]
exten => _X.,1,NoOp(Inbound from UIS: ${EXTEN})
 same => n,Answer()
 same => n,Set(UUID=${SHELL(uuidgen | tr -d '\n')})
 same => n,AudioSocket(${UUID},${BOT_HOST}:${BOT_PORT})
 same => n,Hangup()
